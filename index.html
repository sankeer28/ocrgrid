<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCRGRID</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3/dist/jszip.min.js"></script>
</head>
<body>

<!-- Landing -->
<div id="landing">
  <div class="land-box">
    <div class="land-logo">OCR<span>GRID</span></div>
    <p class="land-sub">paste images · search text · collaborate</p>
    <div class="land-actions">
      <button id="btn-create" class="btn-accent">Create Room</button>
      <div class="land-or">or join existing</div>
      <div class="land-join-row">
        <input id="input-code" type="text" placeholder="XXXXXX" maxlength="6" spellcheck="false" autocomplete="off">
        <button id="btn-join" class="btn-outline">Join</button>
      </div>
    </div>
    <p class="land-note">OCR runs locally — nothing sent to any server</p>
  </div>
</div>

<!-- App -->
<div id="app" class="hidden">

  <header>
    <div class="hd-top">
      <div class="hd-left">
        <span class="logo">OCR<em>GRID</em></span>
        <div class="room-pill">
          <span class="room-pill-label">ROOM</span>
          <span id="room-code-display"></span>
        </div>
        <button id="btn-copy" class="btn-ghost">copy link</button>
      </div>
      <div class="hd-right">
        <span class="kbd-hint">ctrl+f search</span>
        <button id="btn-export" class="btn-ghost">export zip</button>
        <label class="btn-accent btn-sm upload-label">
          + Upload
          <input id="file-input" type="file" accept="image/*" multiple>
        </label>
        <button id="btn-leave" class="btn-ghost">leave</button>
      </div>
    </div>
    <div id="mobile-header-actions">
      <button id="btn-copy-mobile" class="btn-ghost">
        <svg class="mobile-action-icon" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="9" y="9" width="10" height="10" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"/>
          <rect x="5" y="5" width="10" height="10" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"/>
        </svg>
        <span>copy link</span>
      </button>
      <button id="btn-export-mobile" class="btn-ghost">
        <svg class="mobile-action-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 4v10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M8.5 10.5 12 14l3.5-3.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <rect x="5" y="16" width="14" height="4" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.8"/>
        </svg>
        <span>export zip</span>
      </button>
      <button id="btn-leave-mobile" class="btn-ghost">
        <svg class="mobile-action-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M10 6H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M14 8l4 4-4 4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M18 12H9" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <span>leave</span>
      </button>
    </div>
    <div id="board-hscroll" aria-label="Horizontal board scrollbar">
      <div id="board-hscroll-track">
        <div id="board-hscroll-thumb"></div>
      </div>
    </div>
  </header>

  <!-- Search -->
  <div id="search-bar">
    <span class="search-icon">/</span>
    <input id="search-input" type="search" placeholder="search text in all images…" autocomplete="off" spellcheck="false">
    <span id="search-count"></span>
    <button id="btn-search-close">✕</button>
  </div>

  <!-- Board -->
  <div id="board">
    <!-- columns injected here -->
    <button id="btn-add-col">
      <span class="add-col-plus">+</span>
      <span>Add Column</span>
    </button>
  </div>

  <div id="mobile-upload-wrap" class="hidden">
    <button id="btn-search-mobile" class="btn-ghost">
      <svg class="mobile-action-icon" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="11" cy="11" r="6" fill="none" stroke="currentColor" stroke-width="1.8"/>
        <path d="M16 16l4 4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span>Search</span>
    </button>
    <button id="btn-upload-mobile" class="btn-accent">
      <svg class="mobile-action-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 5v10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M8.5 8.5 12 5l3.5 3.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="5" y="14" width="14" height="5" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.8"/>
      </svg>
      <span>Upload Photo</span>
    </button>
  </div>

  <!-- Column name prompt -->
  <div id="col-prompt" class="hidden">
    <div class="prompt-box">
      <p class="prompt-label">Column name</p>
      <input id="col-name-input" type="text" maxlength="32" placeholder="e.g. My Screenshots">
      <div class="prompt-actions">
        <button id="col-prompt-cancel" class="btn-ghost">Cancel</button>
        <button id="col-prompt-ok" class="btn-accent btn-sm">Create</button>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="hidden">
    <div id="lb-backdrop"></div>
    <div id="lb-box">
      <button id="lb-close">✕</button>
      <img id="lb-img" src="" alt="">
      <div id="lb-text"></div>
    </div>
  </div>

</div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
